<!DOCTYPE html>
<html lang="pt-br">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho">

        <h1>Tela de Cadastro</h1>

    </header>
    
    <main class="cadastrar">

        <form action="Login.html" class="formulario">

            <section class="nomeCompleto">

                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="Nome Completo" required>

            </section>

            <section class="email">

                <label for="email">Digite seu Email:</label>
                <input type="email" id="email" name="email" required>

            </section>

            <section class="senha">

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="Senha" required>

            </section>

            <section class="confirmar-Senha">

                <label for="confirmarSenha">Confirme a sua Senha:</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" required>

            </section>

            <section class="checkbox">

                <label for="termos">
                    <input type="checkbox" id="termos" name="termos" required>Li e concordo com os termos
                </label>
                
            </section>

            <section class="botao">

                <button type="submit">Cadastrar</button>

            </section>
        
        </form>

    </main>

</body>
</html>
